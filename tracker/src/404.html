<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Not found — Tracker</title>
    <!--
      Standalone 404 page. Cloudflare Static Assets serves this file verbatim for unknown paths
      (worker.ts falls through to env.ASSETS.fetch) — the framework does NOT inject the hashed
      `assets/main-*.css` here the way it does for index.html. So the tracker look is inlined below:
      a trimmed copy of the design tokens + the not-found page styling, mirroring src/styles/*.
    -->
    <style>
      @layer reset, tokens, base, layout, page;

      /* — reset: the essentials from src/styles/reset.css — */
      @layer reset {
        *,
        *::before,
        *::after {
          box-sizing: border-box;
          margin: 0;
        }

        html {
          -webkit-text-size-adjust: 100%;
          text-size-adjust: 100%;
        }

        body {
          min-height: 100dvh;
          -webkit-font-smoothing: antialiased;
          text-rendering: optimizeLegibility;
        }

        a {
          color: inherit;
          text-decoration: none;
        }

        :focus-visible {
          outline: 2px solid var(--focus-ring);
          outline-offset: 2px;
        }

        ::selection {
          background: var(--accent-soft);
          color: var(--text-primary);
        }
      }

      /* — tokens: the subset of src/styles/tokens.css this page uses (two-layer: primitives → semantics) — */
      @layer tokens {
        :root {
          /* Primitives: cool slate scale */
          --slate-50: #f4f6fb;
          --slate-100: #e7ebf3;
          --slate-200: #ccd3e2;
          --slate-300: #a4afc6;
          --slate-400: #717d99;
          --slate-500: #4d586f;
          --slate-650: #2a3242;
          --slate-700: #232a38;
          --slate-800: #1a202b;
          --slate-850: #141922;
          --slate-900: #0f131a;
          --slate-950: #0a0d12;

          /* Primitives: accents (fixed across themes) */
          --indigo-400: #818cf8;
          --indigo-500: #6366f1;
          --indigo-600: #4f46e5;
          --violet-500: #8b5cf6;

          /* Primitives: type */
          --font-sans:
            "Inter", "Inter Variable", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
          --font-mono:
            "JetBrains Mono", "JetBrains Mono Variable", ui-monospace, "SF Mono", "Cascadia Code",
            "Fira Code", "IBM Plex Mono", monospace;

          /* Primitives: spacing (4px base) */
          --space-2: 0.5rem;
          --space-3: 0.75rem;
          --space-4: 1rem;
          --space-5: 1.5rem;
          --space-6: 2rem;
          --space-8: 3rem;

          /* Primitives: radii */
          --radius-md: 6px;
          --radius-pill: 999px;

          /* Primitives: type scale */
          --text-xs: 0.6875rem;
          --text-base: 0.9375rem;
          --text-lg: 1.0625rem;
          --text-2xl: 1.875rem;

          /* Primitives: motion */
          --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
          --ease-in: cubic-bezier(0.4, 0, 1, 1);
          --duration-fast: 120ms;
          --duration-enter: 420ms;

          /* Semantics: theming (dark default; surfaces + text flip, accents stay fixed) */
          color-scheme: dark;

          --surface-page: light-dark(var(--slate-50), var(--slate-950));
          --surface-overlay: light-dark(#ffffffcc, #10141bcc);

          --text-primary: light-dark(var(--slate-900), var(--slate-50));
          --text-body: light-dark(var(--slate-700), var(--slate-200));
          --text-muted: light-dark(var(--slate-500), var(--slate-400));
          --text-faint: light-dark(var(--slate-400), var(--slate-500));
          --text-on-accent: #ffffff;

          --border-subtle: light-dark(var(--slate-200), var(--slate-700));

          --accent: var(--indigo-500);
          --accent-hover: var(--indigo-400);
          --accent-soft: color-mix(in srgb, var(--indigo-500) 16%, transparent);
          --accent-glow: color-mix(in srgb, var(--indigo-500) 28%, transparent);
          --focus-ring: color-mix(in srgb, var(--indigo-500) 55%, transparent);

          --shadow-sm: 0 1px 2px light-dark(#0f131a14, #00000059);
          --shadow-md: 0 4px 14px light-dark(#0f131a1f, #00000080);
        }
      }

      /* — base: body background + type baseline, matching src/styles/base.css — */
      @layer base {
        body {
          background: var(--surface-page);
          color: var(--text-body);
          font-family: var(--font-sans);
          font-size: var(--text-base);
          line-height: 1.5;
          font-feature-settings: "cv11", "ss01";
          background-image:
            radial-gradient(1100px 480px at 78% -8%, var(--accent-soft), transparent 70%),
            radial-gradient(
              820px 420px at 8% 0%,
              color-mix(in srgb, var(--violet-500) 8%, transparent),
              transparent 72%
            );
          background-attachment: fixed;
        }
      }

      /* — layout: the persistent SiteLayout chrome (header + main), mirroring SiteLayout.css — */
      @layer layout {
        [data-island="site-layout"] {
          display: flex;
          flex-direction: column;
          min-height: 100dvh;
        }

        header[data-site-header] {
          position: sticky;
          top: 0;
          z-index: 20;
          display: flex;
          align-items: baseline;
          gap: var(--space-4);
          padding: var(--space-3) var(--space-5);
          background: var(--surface-overlay);
          border-bottom: 1px solid var(--border-subtle);
          backdrop-filter: saturate(140%) blur(10px);
        }

        a[data-brand] {
          --dot: 9px;
          display: inline-flex;
          align-items: center;
          gap: var(--space-2);
          color: var(--text-primary);
          font-weight: 720;
          font-size: var(--text-lg);
          letter-spacing: -0.02em;
          transition: opacity var(--duration-fast) var(--ease-out-expo);
        }

        /* Accent "live" dot before the wordmark — the engineered signature. */
        a[data-brand]::before {
          content: "";
          width: var(--dot);
          height: var(--dot);
          border-radius: var(--radius-pill);
          background: var(--accent);
          box-shadow: 0 0 0 4px var(--accent-soft);
          animation: live-blink 2.4s var(--ease-in) infinite;
        }

        a[data-brand]:hover {
          opacity: 0.82;
        }

        p[data-tagline] {
          color: var(--text-muted);
          font-family: var(--font-mono);
          font-size: var(--text-xs);
          letter-spacing: 0.01em;
        }

        @media (max-width: 600px) {
          header[data-site-header] {
            gap: var(--space-3);
            padding: var(--space-3) var(--space-3);
          }

          p[data-tagline] {
            display: none;
          }
        }
      }

      /* — page: the not-found hero (fills the main region below the header) — */
      @layer page {
        main[data-page="not-found"] {
          flex: 1;
          display: grid;
          place-content: center;
          justify-items: center;
          gap: var(--space-4);
          padding: var(--space-8) var(--space-6);
          text-align: center;
          animation: enter-rise var(--duration-enter) var(--ease-out-expo) both;
        }

        [data-code] {
          font-family: var(--font-mono);
          font-size: clamp(4rem, 16vw, 8rem);
          font-weight: 700;
          line-height: 1;
          letter-spacing: -0.04em;
          color: var(--accent);
          text-shadow: 0 0 48px var(--accent-glow);
        }

        main[data-page="not-found"] h1 {
          color: var(--text-primary);
          font-size: var(--text-2xl);
          font-weight: 650;
          line-height: 1.2;
          letter-spacing: -0.02em;
        }

        [data-message] {
          max-width: 38ch;
          color: var(--text-muted);
          text-wrap: pretty;
        }

        a[data-back] {
          margin-top: var(--space-2);
          display: inline-flex;
          align-items: center;
          gap: var(--space-2);
          padding: var(--space-3) var(--space-5);
          color: var(--text-on-accent);
          background: var(--accent);
          border-radius: var(--radius-md);
          font-weight: 550;
          letter-spacing: 0.005em;
          box-shadow: var(--shadow-sm);
          transition:
            background-color var(--duration-fast) var(--ease-out-expo),
            transform var(--duration-fast) var(--ease-out-expo),
            box-shadow var(--duration-fast) var(--ease-out-expo);
        }

        a[data-back]:hover {
          background: var(--accent-hover);
          box-shadow: var(--shadow-md), 0 0 0 4px var(--accent-soft);
        }

        a[data-back]:active {
          transform: translateY(1px);
        }

        /* Engineered trace line — mono, faint; JS fills in the path that 404'd. */
        [data-trace] {
          margin-top: var(--space-3);
          color: var(--text-faint);
          font-family: var(--font-mono);
          font-size: var(--text-xs);
          letter-spacing: 0.02em;
        }
      }

      /* Soft breathing glow on the live-feed dot (from src/styles/animations.css). */
      @keyframes live-blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }

      /* Subtle rise + fade for the hero entering (from src/styles/animations.css). */
      @keyframes enter-rise {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Reduced-motion kill-switch, mirroring src/styles/utilities.css. */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          /* biome-ignore lint/complexity/noImportantStyles: reduced-motion kill-switch — the universal selector has no specificity, so !important is required to beat every animation declaration */
          animation-duration: 0.01ms !important;
          /* biome-ignore lint/complexity/noImportantStyles: reduced-motion kill-switch (see above) */
          animation-iteration-count: 1 !important;
          /* biome-ignore lint/complexity/noImportantStyles: reduced-motion kill-switch (see above) */
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div data-island="site-layout">
      <header data-site-header>
        <a data-brand href="/">Tracker</a>
        <p data-tagline>Real-time kanban, proving @moku-labs/worker</p>
      </header>
      <main data-page="not-found">
        <p data-code>404</p>
        <h1>Board not found</h1>
        <p data-message>
          That board doesn't exist — it may have been deleted, or the link is wrong.
        </p>
        <a data-back href="/">← Back to boards</a>
        <p data-trace><span data-trace-path>no such resource</span></p>
      </main>
    </div>
    <script>
      // Progressive enhancement: surface the path that 404'd. textContent is never parsed as HTML,
      // so the (browser-encoded) pathname can't inject markup. Works without JS too — the static
      // fallback text above just stays put. Guarded to http(s): opened directly as a data:/file: URL
      // (e.g. a preview), location.pathname is the whole encoded document, not a request path — so we
      // leave the static fallback in that case.
      (() => {
        if (location.protocol !== "http:" && location.protocol !== "https:") return;
        const el = document.querySelector("[data-trace-path]");
        if (el) el.textContent = `GET ${location.pathname}${location.search} → 404`;
      })();
    </script>
  </body>
</html>
